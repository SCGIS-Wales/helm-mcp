sonar.projectKey=helm-mcp
sonar.projectName=helm-mcp
sonar.projectVersion=0.1.0

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go,**/tests/**/*.py

# Source exclusions (vendor, generated, test infra)
sonar.exclusions=vendor/**,**/*_test.go,**/testdata/**,python/.venv/**,python/dist/**,python/build/**,**/*.pb.go

# Go coverage
sonar.go.coverage.reportPaths=coverage.out

# Python sources and coverage
sonar.python.version=3.12
sonar.python.coverage.reportPaths=python_coverage_fixed.xml

# Coverage exclusions: SDK wrapper packages that require a real Kubernetes cluster
# for integration testing, plus cmd/main.go entry point
sonar.coverage.exclusions=\
  internal/helmengine/v3/**,\
  internal/helmengine/v4/**,\
  cmd/helm-mcp/main.go

sonar.sourceEncoding=UTF-8
