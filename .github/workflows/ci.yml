name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------- Go ----------

  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  test:
    name: Go Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: go
          fail_ci_if_error: false

  build:
    name: Go Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o helm-mcp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/helm-mcp/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: helm-mcp-*

  security:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        # stdlib vulnerabilities require a Go runtime update; fail only for
        # vulnerabilities in our own code or third-party dependencies
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          if grep -rn --include='*.go' -E '(password|secret|token|apikey)\s*[:=]\s*"[^"]{8,}"' internal/ cmd/ 2>/dev/null | grep -v '_test.go' | grep -v 'jsonschema:' | grep -v 'json:"'; then
            echo "WARNING: Potential hardcoded secrets found"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  # ---------- Python ----------

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.14']
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v tests/

  python-build:
    name: Python Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/

  wheel-builder-test:
    name: Wheel Builder Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install test dependencies
        run: pip install pytest

      - name: Run wheel builder tests
        run: pytest -v scripts/test_build_wheels.py

  # ---------- Integration Tests ----------

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build helm-mcp binary
        run: go build -o helm-mcp ./cmd/helm-mcp/

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create k3d cluster
        run: k3d cluster create helm-mcp-test --wait --timeout 120s

      - name: Wait for cluster ready
        run: |
          kubectl wait --for=condition=ready node --all --timeout=60s
          kubectl cluster-info

      - name: Add Helm repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Install Python test dependencies
        run: pip install fastmcp pytest pytest-asyncio pytest-timeout

      - name: Run integration tests
        run: python3 -m pytest tests/integration/ -v --timeout=600

      - name: Cleanup k3d cluster
        if: always()
        run: k3d cluster delete helm-mcp-test 2>/dev/null || true

  # ---------- Auto-tag on merge to main ----------
  # Determines the next semver patch version, updates pyproject.toml,
  # commits, creates a git tag, and pushes. Outputs the tag/version so
  # downstream jobs in THIS run can use them (no second workflow trigger).

  auto-tag:
    name: Auto-tag release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test, security, python-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.create_tag.outputs.created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT="0.1.0"
          else
            CURRENT="${LATEST_TAG#v}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3 | cut -d- -f1)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT} (tag: v${NEXT})"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version and create tag
        id: create_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          # Update Python package version
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" python/pyproject.toml

          # Update Python __init__.py version
          sed -i "s/^__version__ = \".*\"/__version__ = \"$VERSION\"/" python/src/helm_mcp/__init__.py

          # Commit the version bump (if there are changes)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python/pyproject.toml python/src/helm_mcp/__init__.py
          if git diff --cached --quiet; then
            echo "Version files already up to date"
          else
            git commit -m "chore: bump version to ${VERSION} [skip ci]"
            git push origin main
          fi

          # Create and push tag on the current commit
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::Created tag $TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"

  # ---------- Release build (Go binaries with version) ----------

  release-build:
    name: Release Build (${{ matrix.goos }}-${{ matrix.goarch }})
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME=helm-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w -X main.version=${{ needs.auto-tag.outputs.tag }}" \
            -o "${BINARY_NAME}" ./cmd/helm-mcp/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: helm-mcp-*

  # ---------- Build platform-specific Python wheels ----------

  build-platform-wheels:
    name: Build Platform Wheels
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, release-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (version-bumped commit)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets/

      - name: Generate checksums.json for universal wheel
        run: |
          python3 -c "
          import hashlib, json, os
          checksums = {
              'version': '${{ needs.auto-tag.outputs.version }}',
              'binaries': {},
          }
          assets_dir = 'release-assets'
          for f in sorted(os.listdir(assets_dir)):
              if f.startswith('helm-mcp-'):
                  path = os.path.join(assets_dir, f)
                  sha = hashlib.sha256(open(path, 'rb').read()).hexdigest()
                  checksums['binaries'][f] = sha
          with open('python/src/helm_mcp/checksums.json', 'w') as out:
              json.dump(checksums, out, indent=2)
              out.write('\n')
          print(json.dumps(checksums, indent=2))
          "

      - name: Build universal wheel
        working-directory: python
        run: |
          pip install build
          python -m build --wheel

      - name: Build platform-specific wheels
        run: |
          python scripts/build_wheels.py \
            --wheel "python/dist/helm_mcp-${{ needs.auto-tag.outputs.version }}-py3-none-any.whl" \
            --binaries-dir release-assets/ \
            --output dist/

      - name: Copy universal wheel to dist/
        run: cp python/dist/*.whl dist/

      - name: List built wheels
        run: ls -la dist/

      - name: Upload all wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: dist/*.whl

  # ---------- GitHub Release ----------

  github-release:
    name: GitHub Release
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, release-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets/

      - name: Create checksums
        working-directory: release-assets
        run: sha256sum helm-mcp-* > checksums.txt

      - name: Delete existing draft releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.tag }}"
          gh api "repos/${{ github.repository }}/releases" --jq \
            ".[] | select(.tag_name==\"${TAG}\" and .draft==true) | .id" \
          | while read -r DRAFT_ID; do
            echo "Deleting draft release (id=${DRAFT_ID})..."
            gh api -X DELETE "repos/${{ github.repository }}/releases/${DRAFT_ID}"
          done

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.auto-tag.outputs.tag }}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, updating..."
            gh release edit "${TAG}" --latest
            gh release upload "${TAG}" --clobber release-assets/*
          else
            echo "Creating new release ${TAG}..."
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              --latest \
              release-assets/*
          fi

  # ---------- Publish Python package to PyPI ----------

  publish-pypi:
    name: Publish to PyPI
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag, build-platform-wheels]
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write
    steps:
      - name: Checkout source (for sdist build)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build sdist
        working-directory: python
        run: |
          pip install build
          python -m build --sdist

      - name: Prepare dist directory
        run: mkdir -p dist/

      - name: Download pre-built wheels
        uses: actions/download-artifact@v4
        with:
          name: python-wheels
          path: dist/

      - name: Copy sdist to dist/
        run: cp python/dist/*.tar.gz dist/

      - name: Verify packages
        run: |
          pip install twine
          twine check dist/*

      - name: List packages to publish
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ---------- Publish container image to GitHub Container Registry ----------

  publish-container:
    name: Publish Container Image
    if: needs.auto-tag.outputs.created == 'true'
    needs: [auto-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.auto-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.auto-tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.auto-tag.outputs.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
