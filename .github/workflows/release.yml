name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ---------- Go binaries ----------

  build-go:
    name: Build Go (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME=helm-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "${BINARY_NAME}" ./cmd/helm-mcp/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: helm-mcp-*

  # ---------- GitHub Release ----------

  github-release:
    name: GitHub Release
    needs: build-go
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all Go binaries
        uses: actions/download-artifact@v4
        with:
          pattern: go-binary-*
          merge-multiple: true
          path: release-assets/

      - name: Create checksums
        working-directory: release-assets
        run: sha256sum helm-mcp-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

  # ---------- Python package ----------

  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: python/dist/

  # ---------- Publish to TestPyPI ----------

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build-python
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/helm-mcp
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ---------- Publish to PyPI ----------

  publish-pypi:
    name: Publish to PyPI
    needs: [build-python, publish-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/helm-mcp
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
