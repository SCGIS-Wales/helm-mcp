name: Bug Report
description: Report a bug in helm-mcp
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure helm-mcp with ...
        2. Call tool '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or logs if available.
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport Mode
      options:
        - stdio
        - HTTP (Streamable HTTP)
        - SSE
        - Python wrapper
    validations:
      required: true

  - type: dropdown
    id: helm-version
    attributes:
      label: Helm SDK Version
      options:
        - v4 (default)
        - v3
        - Both
        - Not sure
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: helm-mcp Version
      description: "Output of `helm-mcp --version` or Python package version"
      placeholder: "0.1.18"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.3 (arm64) / Ubuntu 24.04 (amd64) / Windows 11"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      options:
        - Claude Desktop
        - Claude Code
        - Cursor
        - VS Code
        - Windsurf
        - Custom / Other
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
    validations:
      required: false
