version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - noctx
    - ineffassign
  settings:
    gosec:
      excludes:
        - G101 # false positives on test fixtures with example credentials
        - G104 # unhandled errors on deferred Close()
        - G117 # Password fields are required for Helm repo/registry auth inputs
        - G204 # Plugin management requires subprocess execution with user args
  exclusions:
    paths:
      - vendor
